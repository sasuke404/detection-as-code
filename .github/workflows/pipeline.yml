name: Detection-as-Code Pipeline

on:
  push:
    branches: [ main ]
    paths:
      - 'rules/**'
      - 'scripts/**'
      - '.github/workflows/**'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test-and-convert:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyyaml requests pytest

    - name: Validate Sigma Rules (YAML Syntax)
      run: |
        python -c "
        import yaml
        from pathlib import Path
        errors = []
        for f in Path('rules').rglob('*.yml'):
            try:
                with open(f) as fh:
                    yaml.safe_load(fh)
                print(f'[OK] {f}')
            except Exception as e:
                errors.append(str(f))
                print(f'[FAIL] {f}: {e}')
        if errors:
            print(f'\n{len(errors)} rule(s) have syntax errors!')
            exit(1)
        print(f'\nAll rules valid.')
        "

    - name: Run Rule Tests
      run: python scripts/test_rules.py

    - name: Convert Sigma to Wazuh
      run: python scripts/convert.py

    - name: Upload Wazuh Rules Artifact
      uses: actions/upload-artifact@v4
      with:
        name: wazuh-rules
        path: wazuh_rules/

  deploy:
    needs: test-and-convert
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyyaml requests

    - name: Convert Sigma to Wazuh
      run: python scripts/convert.py

    - name: Deploy to Wazuh
      env:
        WAZUH_API_URL: ${{ secrets.WAZUH_API_URL }}
        WAZUH_API_USER: ${{ secrets.WAZUH_API_USER }}
        WAZUH_API_PASS: ${{ secrets.WAZUH_API_PASS }}
      run: python scripts/deploy.py
